<!-- WhatsApp Icon Injection Script -->
<script>
(function() {
    var whatsappIconAdded = false;

    // Ícone SVG do WhatsApp
    var iconSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" style="vertical-align: middle; margin-left: 6px; display: inline-block;"><path fill="#25D366" d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';

    function addWhatsAppIcon() {
        if (whatsappIconAdded) return;

        // Procura todos os elementos que contêm exatamente "Agende uma consulta"
        var allElements = document.getElementsByTagName('*');
        var targetElement = null;

        for (var i = 0; i < allElements.length; i++) {
            var el = allElements[i];

            // Verifica se o texto exato está presente
            if (el.textContent && el.textContent.trim() === 'Agende uma consulta') {
                // Verifica se é visível
                var rect = el.getBoundingClientRect();
                if (rect.width > 0 && rect.height > 0) {
                    // Verifica se já tem ícone
                    if (!el.innerHTML.includes('svg') && !el.querySelector('svg')) {
                        targetElement = el;
                        break;
                    }
                }
            }

            // Também verifica se o elemento pai contém o texto
            if (el.childNodes.length === 1 && el.childNodes[0].nodeType === 3) {
                if (el.textContent.trim() === 'Agende uma consulta') {
                    var rect = el.getBoundingClientRect();
                    if (rect.width > 0 && rect.height > 0 && !el.innerHTML.includes('<svg')) {
                        targetElement = el;
                        break;
                    }
                }
            }
        }

        if (targetElement) {
            // Adiciona o ícone
            var span = document.createElement('span');
            span.innerHTML = iconSVG;
            span.style.cssText = 'display: inline-flex; vertical-align: middle; margin-left: 4px; pointer-events: none;';

            // Tenta adicionar de diferentes formas dependendo da estrutura
            if (targetElement.tagName === 'A' || targetElement.tagName === 'BUTTON') {
                targetElement.appendChild(span);
                targetElement.style.display = 'inline-flex';
                targetElement.style.alignItems = 'center';
            } else {
                targetElement.appendChild(span);
            }

            whatsappIconAdded = true;
            console.log('✓ WhatsApp icon added to:', targetElement);
            return true;
        }
        return false;
    }

    // Tenta adicionar imediatamente e também após o carregamento
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(addWhatsAppIcon, 1000);
            setTimeout(addWhatsAppIcon, 2000);
            setTimeout(addWhatsAppIcon, 3000);
        });
    } else {
        // DOM já carregou
        setTimeout(addWhatsAppIcon, 500);
        setTimeout(addWhatsAppIcon, 1500);
        setTimeout(addWhatsAppIcon, 2500);
    }

    // Observa mudanças no DOM para quando o React renderizar
    var observer = new MutationObserver(function(mutations) {
        if (!whatsappIconAdded) {
            addWhatsAppIcon();
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true
    });

    // Para de observar após 15 segundos
    setTimeout(function() {
        observer.disconnect();
        if (!whatsappIconAdded) {
            console.log('WhatsApp icon: timeout reached without finding target');
        }
    }, 15000);

    // Tenta também quando a janela carregar completamente
    window.addEventListener('load', function() {
        setTimeout(addWhatsAppIcon, 1000);
    });
})();
</script>
